name: Bug Report
description: Report a bug or issue
labels: ["bug"]
body:
  - type: input
    id: engine
    attributes:
      label: Engine
      description: Which engine is affected (leave blank if not engine-specific)?
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        - OS:
        - Python version:
        - GPU:
        - CUDA version:
        - tts-bench version:
    validations:
      required: true
