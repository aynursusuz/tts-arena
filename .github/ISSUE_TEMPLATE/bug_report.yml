name: Bug Report
description: Report a bug or issue
labels: ["bug"]
body:
  - type: dropdown
    id: engine
    attributes:
      label: TTS Engine
      description: Which engine is affected?
      options:
        - All engines
        - kokoro
        - dia
        - orpheus
        - f5-tts
        - bark
        - coqui/xtts
        - chattts
        - cosyvoice
        - fish-speech
        - gpt-sovits
        - piper
        - styletts2
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        - OS:
        - Python version:
        - GPU:
        - CUDA version:
        - tts-arena version:
    validations:
      required: true
